name: Publish Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Structure validation
        run: bun run validate:structure

      - name: Run tests
        run: bun test

      - name: Release package validation
        run: bun run release:check

      - name: Verify tag matches package version
        run: |
          node -e "const pkg=require('./package.json'); const expected='v'+pkg.version; if(process.env.GITHUB_REF_NAME!==expected){console.error('Tag/version mismatch: expected '+expected+' but got '+process.env.GITHUB_REF_NAME); process.exit(1)}"

      - name: Publish to npm via trusted publishing
        run: npm publish --loglevel=error
