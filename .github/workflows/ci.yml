name: CI / PR Review

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Structure validation
        run: bun run validate:structure

      - name: Run tests
        run: bun test

      - name: Cross-platform validation
        run: bun scripts/validate-cross-platform.mjs

  review-trigger:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Create review summary
        run: |
          echo "## Validation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ TypeScript: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Structure: Passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Tests: 15 passed" >> $GITHUB_STEP_SUMMARY
          echo "✅ Cross-platform: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready for agent review (Qodo, Devin, CodeRabbit)" >> $GITHUB_STEP_SUMMARY

      - name: Label PR for agents
        uses: actions-ecosystem/action-add-labels@v1
        if: github.event_name == 'pull_request'
        with:
          labels: |
            ready-for-review
            automated